[build-system]
build-backend = "setuptools.build_meta"
requires = [
  "setuptools>=61",
  "wheel",
]

[project]
name = "busylib-mcp"
description = "MCP server for Busy Bar based on busylib"
readme = "README.md"
requires-python = ">=3.13"
authors = [
  { name = "flipperdevices", email = "pypi@flipperdevices.com" },
]
dependencies = [
  "busylib",
  "pydantic>=2.9",
  "pydantic-settings>=2.12",
]

[project.scripts]
busylib-mcp = "busylib_mcp.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }
packages.find.where = [ "src" ]
