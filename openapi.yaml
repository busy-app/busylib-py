      operationId: getAccountInfo
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"

  /api/account/status:
    get:
      tags:
        - Account
      summary: Get MQTT status info
      description: Retrieves MQTT status
      operationId: getAccountStatus
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatus"

  /api/account/profile:
    get:
      tags:
        - Account
      summary: Get MQTT profile
      description: Retrieves MQTT backend type (dev/prod/local)
      operationId: getAccountProfile
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfile"
    post:
      tags:
        - Account
      summary: Set MQTT profile
      description: Sets MQTT backend type (dev/prod/local)
      operationId: setAccountProfile
      parameters:
        - name: profile
          in: query
          required: true
          schema:
            type: string
            enum: ["dev", "prod", "local", "custom"]
          example: "dev"
        - name: custom_url
          in: query
          schema:
            type: string
            example: "mqtts://mqtt.example.com:8883"
      responses:
        "200":
          description: Set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/time/timestamp:
    post:
      tags:
        - Time
      summary: Set current timestamp
      description: |
        Sets the RTC timestamp in ISO 8601 format. Time zone qualifier (e.g. Z of UTC or +hh:mm for local time) is required.
      operationId: setTimeTimestamp
      parameters:
        - name: timestamp
          in: query
          required: true
          schema:
            type: string
            pattern: "^20[0-9]{2}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])T([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](Z|[+-]([01][0-9]|2[0-3])(:?[0-5][0-9])?)$"
          description: ISO 8601 timestamp (e.g., 2025-10-02T14:30:45+02:00 for local time or 2025-10-02T14:30:45Z for UTC)
          example: "2025-10-02T14:30:45+0100"
      responses:
        "200":
          description: Timestamp set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid timestamp format or value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/time/timezone:
    get:
      tags:
        - Time
      summary: Get timezone
      description: Get current timezone name
      operationId: getTimeTimezone
      responses:
        "200":
          description: Timezone got successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimezoneInfo"
        "400":
          description: Invalid timezone offset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Time
      summary: Set timezone
      description: Sets the timezone name. Use /api/time/tzlist to get available names list.
      operationId: setTimeTimezone
      parameters:
        - name: timezone
          in: query
          required: true
          schema:
            type: string
            pattern: "^[A-Za-z][A-Za-z0-9 _+\\-]{0,50}$"
          description: Timezone name (use /api/time/tzlist to get available names)
          example: "Berlin"
      responses:
        "200":
          description: Timezone set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid timezone offset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/time/tzlist:
    get:
      tags:
        - Time
      summary: Get list of supported time zones
      description: Retrieves the list of time zones accepted by /api/time/timezone
      operationId: getTimeTzlist
      responses:
        "200":
          description: Got the list successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimezoneListResponse"
        "400":
          description: Error getting time zone list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/busy/snapshot:
