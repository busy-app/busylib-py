          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Unable to stop BLE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ble/pairing:
    delete:
      tags:
        - BLE
