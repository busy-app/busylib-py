      responses:
        "200":
          description: OK
          content:
            image/bmp:
              schema:
                $ref: "#/components/schemas/ScreenResponse"
        "400":
          description: Wrong display
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ble/enable:
