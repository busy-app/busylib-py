      parameters: []
      responses:
        "200":
          description: Pairing removed, now device is discoverable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Failed to remove because BLE is not initialized or pairing was already removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ble/status:
    get:
      tags:
        - BLE
      description: Returns current BLE status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BleStatusResponse"
        "503":
