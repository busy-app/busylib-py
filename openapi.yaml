      responses:
        "200":
          description: Got profile successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusyProfile"
        "400":
          description: Error getting profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Busy
      summary: Set BUSY time profile
      description: Sets the BUSY timer profile under specified slot
      operationId: setBusyProfile
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BusyProfileSlot"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusyProfile"
      responses:
        "200":
          description: Profile successfully set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error setting profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/smart_home/pairing:
