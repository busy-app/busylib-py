      summary: Get state of emulated smart home switch
      parameters: []
      responses:
        "200":
          description: Successfully got state of emulated smart home switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartHomeSwitchState"
        "503":
          description: Internal smart home service is broken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Smart home
      summary: Set state of emulated smart home switch
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmartHomeSwitchState"
      responses:
        "200":
          description: Successfully set state of emulated smart home switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Internal smart home service is broken
          content:
