            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Unable to start BLE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ble/disable:
    post:
      tags:
