                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Busy
      summary: Set BUSY timer snapshot
      description: Run the timer starting from the given snapshot
      operationId: setBusySnapshot
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusySnapshot"
      responses:
        "200":
          description: Snapshot successfully set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error setting snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/busy/profiles/{slot}:
    get:
      tags:
        - Busy
      summary: Get BUSY timer profile
      description: Gets the BUSY timer profile under specified slot
      operationId: getBusyProfile
      parameters:
