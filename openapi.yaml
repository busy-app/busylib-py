                $ref: "#/components/schemas/SmartHomePairingInfo"
    post:
      tags:
        - Smart home
      summary: Link device to a smart home
      operationId: startSmartHomePairing
      parameters: []
      responses:
        "200":
          description: Successfully started smart home pairing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartHomePairingPayload"
        "503":
